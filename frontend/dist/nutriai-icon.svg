<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Dark background circle -->
  <circle cx="60" cy="60" r="60" fill="#050d05"/>
  
  <!-- Glow effect -->
  <circle cx="60" cy="60" r="50" fill="radial-gradient(circle, rgba(74,222,128,0.1), transparent)"/>
  
  <defs>
    <radialGradient id="melonGrad" cx="40%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#4aaa4a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1a4a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tg1" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#ff8080" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4ade80" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4ade80" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow background -->
  <circle cx="60" cy="60" r="55" fill="url(#glow)"/>

  <!-- Watermelon body -->
  <ellipse cx="60" cy="82" rx="34" ry="21" fill="#2d7a2d"/>
  <ellipse cx="60" cy="82" rx="34" ry="21" fill="url(#melonGrad)"/>
  <path d="M30 76 Q60 68 90 76" stroke="#5acc5a" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <path d="M28 83 Q60 75 92 83" stroke="#5acc5a" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>

  <!-- Leafy greens left -->
  <path d="M46 72 C42 62 36 54 34 42" stroke="#22a84a" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M40 60 C36 54 30 50 26 44" stroke="#22a84a" stroke-width="2" stroke-linecap="round"/>
  <ellipse cx="33" cy="41" rx="6" ry="3" fill="#22a84a" transform="rotate(-30 33 41)"/>
  <ellipse cx="25" cy="43" rx="5" ry="2.5" fill="#2ecc71" transform="rotate(-50 25 43)"/>

  <!-- Carrot center -->
  <path d="M57 70 C56 60 54 48 53 34" stroke="#e67e22" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M63 70 C64 60 66 48 67 34" stroke="#e67e22" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M54 34 C56 26 64 26 66 34" fill="#e67e22"/>
  <path d="M57 70 Q60 76 63 70" fill="#d35400"/>
  <path d="M60 34 C58 24 52 18 48 16" stroke="#22a84a" stroke-width="2" stroke-linecap="round"/>
  <path d="M60 34 C62 22 68 18 72 15" stroke="#22a84a" stroke-width="2" stroke-linecap="round"/>
  <path d="M60 34 C60 20 60 16 60 12" stroke="#2ecc71" stroke-width="1.5" stroke-linecap="round"/>
  <ellipse cx="48" cy="16" rx="4" ry="2" fill="#22a84a" transform="rotate(-40 48 16)"/>
  <ellipse cx="72" cy="15" rx="4" ry="2" fill="#22a84a" transform="rotate(40 72 15)"/>
  <ellipse cx="60" cy="12" rx="3.5" ry="1.8" fill="#2ecc71"/>

  <!-- Tomato wheels -->
  <circle cx="36" cy="98" r="11" fill="#c0392b"/>
  <circle cx="36" cy="98" r="11" fill="url(#tg1)"/>
  <circle cx="36" cy="98" r="7.5" fill="#e74c3c"/>
  <circle cx="36" cy="98" r="4" fill="#c0392b"/>
  <path d="M33 87 C33 83 36 82 38 84" stroke="#22a84a" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="84" cy="98" r="11" fill="#c0392b"/>
  <circle cx="84" cy="98" r="11" fill="url(#tg1)"/>
  <circle cx="84" cy="98" r="7.5" fill="#e74c3c"/>
  <circle cx="84" cy="98" r="4" fill="#c0392b"/>
  <path d="M81 87 C81 83 84 82 86 84" stroke="#22a84a" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Shine -->
  <circle cx="32" cy="94" r="2.5" fill="white" opacity="0.15"/>
  <circle cx="80" cy="94" r="2.5" fill="white" opacity="0.15"/>

  <!-- Green border ring -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#4ade80" stroke-width="1.5" opacity="0.2"/>
</svg>
